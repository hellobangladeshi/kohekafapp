<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Kohekaf | Premium Food Delivery</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #FF5722;
            --primary-dark: #E64A19;
            --primary-light: #FFE0B2;
            --secondary: #4CAF50;
            --dark: #2C3E50;
            --light: #F8F9FA;
            --white: #FFFFFF;
            --gray: #6C757D;
            --shadow: 0 10px 30px rgba(0,0,0,0.1);
            --shadow-sm: 0 2px 8px rgba(0,0,0,0.05);
            --radius: 16px;
            --radius-sm: 12px;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Loading Animation */
        .loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10000;
            transition: opacity 0.5s ease;
        }

        .loader {
            text-align: center;
        }

        .loader-logo {
            width: 120px;
            height: 120px;
            background: white;
            border-radius: 35px;
            margin: 0 auto 25px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 55px;
            animation: float 2s ease-in-out infinite;
            box-shadow: var(--shadow);
        }

        .loader-text {
            color: white;
            font-size: 28px;
            font-weight: 700;
            letter-spacing: 1px;
        }

        .loader-dots {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-top: 20px;
        }

        .loader-dots span {
            width: 10px;
            height: 10px;
            background: white;
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out both;
        }

        .loader-dots span:nth-child(1) { animation-delay: -0.32s; }
        .loader-dots span:nth-child(2) { animation-delay: -0.16s; }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }

        /* Navbar */
        .navbar {
            background: rgba(255,255,255,0.98);
            backdrop-filter: blur(10px);
            box-shadow: var(--shadow-sm);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .nav-container {
            max-width: 1280px;
            margin: 0 auto;
            padding: 16px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }

        .logo {
            font-size: 26px;
            font-weight: 800;
            background: linear-gradient(135deg, var(--primary), #FF8C42);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .nav-links {
            display: flex;
            gap: 12px;
            align-items: center;
            flex-wrap: wrap;
        }

        .nav-link {
            padding: 8px 20px;
            border-radius: 40px;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.3s ease;
            color: #2C3E50;
        }

        .nav-link:hover {
            background: var(--primary);
            color: white;
        }

        .cart-icon {
            position: relative;
            cursor: pointer;
            font-size: 24px;
            padding: 8px;
        }

        .cart-badge {
            position: absolute;
            top: 0;
            right: 0;
            background: var(--primary);
            color: white;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            font-size: 11px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Main Container */
        .main-container {
            max-width: 1280px;
            margin: 0 auto;
            padding: 24px;
        }

        /* User Type Selector */
        .user-type-selector {
            display: flex;
            gap: 12px;
            justify-content: center;
            margin-bottom: 32px;
            flex-wrap: wrap;
        }

        .user-type-btn {
            padding: 12px 28px;
            border: none;
            border-radius: 50px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            background: white;
            color: #2C3E50;
            box-shadow: var(--shadow-sm);
        }

        .user-type-btn.active {
            background: var(--primary);
            color: white;
            box-shadow: var(--shadow);
        }

        /* Sections */
        .section {
            display: none;
            animation: fadeIn 0.4s ease;
        }

        .section.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Cards */
        .card {
            background: white;
            border-radius: var(--radius);
            padding: 24px;
            box-shadow: var(--shadow-sm);
            margin-bottom: 24px;
            transition: all 0.3s ease;
        }

        .card:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow);
        }

        /* Restaurant Grid */
        .restaurant-grid, .meal-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 24px;
            margin-top: 20px;
        }

        .restaurant-card, .meal-card {
            background: white;
            border-radius: var(--radius);
            overflow: hidden;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: var(--shadow-sm);
        }

        .restaurant-card:hover, .meal-card:hover {
            transform: translateY(-5px);
            box-shadow: var(--shadow);
        }

        .restaurant-image, .meal-image {
            height: 160px;
            background: linear-gradient(135deg, var(--primary-light), var(--primary));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 65px;
        }

        .restaurant-info, .meal-info {
            padding: 16px;
        }

        .restaurant-name, .meal-name {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 6px;
        }

        .rating {
            color: #FFB800;
            margin: 6px 0;
            font-size: 14px;
        }

        .delivery-time, .price {
            font-size: 14px;
            color: var(--gray);
        }

        .price {
            color: var(--primary);
            font-weight: 700;
            font-size: 18px;
            margin-top: 8px;
        }

        /* Buttons */
        .btn {
            padding: 12px 28px;
            border: none;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 14px;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
        }

        .btn-primary:hover {
            background: var(--primary-dark);
            transform: scale(1.02);
        }

        .btn-outline {
            background: transparent;
            border: 2px solid var(--primary);
            color: var(--primary);
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(5px);
            z-index: 2000;
            align-items: center;
            justify-content: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: white;
            border-radius: 28px;
            max-width: 450px;
            width: 90%;
            max-height: 85vh;
            overflow-y: auto;
            padding: 32px;
            animation: modalIn 0.3s ease;
        }

        @keyframes modalIn {
            from { transform: scale(0.9); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        /* Form */
        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #2C3E50;
        }

        .form-group input, .form-group select, .form-group textarea {
            width: 100%;
            padding: 14px;
            border: 2px solid #E9ECEF;
            border-radius: 12px;
            font-size: 14px;
            transition: all 0.3s ease;
        }

        .form-group input:focus, .form-group select:focus {
            outline: none;
            border-color: var(--primary);
        }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: #2C3E50;
            color: white;
            padding: 14px 28px;
            border-radius: 50px;
            z-index: 2000;
            animation: slideUp 0.3s ease;
            box-shadow: var(--shadow);
        }

        @keyframes slideUp {
            from { transform: translateY(100px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        /* Order Card */
        .order-card {
            background: var(--light);
            border-radius: var(--radius-sm);
            padding: 16px;
            margin-bottom: 12px;
            border-left: 4px solid var(--primary);
        }

        .order-status {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 50px;
            font-size: 12px;
            font-weight: 600;
        }

        .status-pending { background: #FFE0B2; color: #FF9800; }
        .status-confirmed { background: #E3F2FD; color: #2196F3; }
        .status-delivered { background: #E8F5E9; color: #4CAF50; }

        /* Stats Grid */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: white;
            padding: 24px;
            border-radius: var(--radius);
            text-align: center;
        }

        .stat-value {
            font-size: 32px;
            font-weight: 800;
            color: var(--primary);
        }

        /* Search Input */
        .search-input {
            width: 100%;
            padding: 14px 20px;
            border: 2px solid #E9ECEF;
            border-radius: 50px;
            font-size: 15px;
            transition: all 0.3s ease;
        }

        .search-input:focus {
            outline: none;
            border-color: var(--primary);
        }

        /* Categories */
        .category-btn {
            padding: 10px 24px;
            background: white;
            border: none;
            border-radius: 40px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: var(--shadow-sm);
        }

        .category-btn:hover {
            background: var(--primary);
            color: white;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .nav-container {
                flex-direction: column;
                gap: 12px;
            }
            .restaurant-grid, .meal-grid {
                grid-template-columns: 1fr;
            }
            .user-type-selector {
                gap: 8px;
            }
            .user-type-btn {
                padding: 8px 18px;
                font-size: 12px;
            }
        }
    </style>
</head>
<body>
    <!-- Loading Screen -->
    <div id="loadingScreen" class="loading-screen">
        <div class="loader">
            <div class="loader-logo">🍔</div>
            <div class="loader-text">Kohekaf</div>
            <div class="loader-dots">
                <span></span>
                <span></span>
                <span></span>
            </div>
        </div>
    </div>

    <!-- Navigation -->
    <div id="navbar" class="navbar" style="display: none;">
        <div class="nav-container">
            <div class="logo" onclick="changeSection('home')">🍔 Kohekaf</div>
            <div class="nav-links" id="navLinks"></div>
        </div>
    </div>

    <!-- Main Container -->
    <div class="main-container" id="mainContainer" style="display: none;">
        <!-- User Type Selector -->
        <div class="user-type-selector">
            <button class="user-type-btn active" onclick="setUserType('customer')">👤 Customer</button>
            <button class="user-type-btn" onclick="setUserType('driver')">🚗 Delivery</button>
            <button class="user-type-btn" onclick="setUserType('restaurant')">🏪 Restaurant</button>
            <button class="user-type-btn" onclick="setUserType('admin')">👑 Admin</button>
        </div>

        <!-- Customer Section -->
        <div id="customerSection" class="section active">
            <div class="card">
                <div style="display: flex; gap: 12px; flex-wrap: wrap;">
                    <span style="font-size: 24px;">📍</span>
                    <input type="text" id="locationInput" class="search-input" placeholder="Enter delivery location" style="flex: 1;">
                    <button class="btn btn-primary" onclick="updateLocation()">Set Location</button>
                </div>
            </div>

            <div class="card">
                <input type="text" id="searchInput" class="search-input" placeholder="🔍 Search for restaurants or food..." onkeyup="searchItems()">
            </div>

            <div style="overflow-x: auto; margin-bottom: 32px;">
                <div id="categories" style="display: flex; gap: 12px;"></div>
            </div>

            <h2 style="margin-bottom: 16px;">🍽️ Popular Restaurants</h2>
            <div id="restaurantsList" class="restaurant-grid"></div>

            <h2 style="margin: 40px 0 16px;">🔥 Trending Now</h2>
            <div id="popularItems" class="meal-grid"></div>
        </div>

        <!-- Driver Section -->
        <div id="driverSection" class="section">
            <div class="card">
                <h2 style="margin-bottom: 20px;">🚗 Delivery Dashboard</h2>
                <button class="btn btn-primary" onclick="toggleDriverStatus()" id="driverStatusBtn">🟢 Go Online</button>
                <button class="btn btn-outline" onclick="loadDriverOrders()">🔄 Refresh</button>
                <div id="driverOrdersList" style="margin-top: 24px;"></div>
            </div>
        </div>

        <!-- Restaurant Section -->
        <div id="restaurantSection" class="section">
            <div class="card">
                <h2 style="margin-bottom: 20px;">🏪 Restaurant Dashboard</h2>
                <button class="btn btn-primary" onclick="showAddFoodModal()">➕ Add New Item</button>
                <div id="restaurantMenu" style="margin-top: 24px;"></div>
                <h3 style="margin: 32px 0 16px;">📦 Incoming Orders</h3>
                <div id="restaurantOrders"></div>
            </div>
        </div>

        <!-- Admin Section -->
        <div id="adminSection" class="section">
            <div class="stats-grid" id="adminStats"></div>
            <div class="card">
                <h3>👥 Users</h3>
                <div id="allUsersList"></div>
            </div>
            <div class="card">
                <h3>📊 Orders</h3>
                <div id="allOrdersList"></div>
            </div>
        </div>

        <!-- Modals -->
        <div id="cartModal" class="modal">
            <div class="modal-content">
                <h2 style="margin-bottom: 20px;">🛒 Your Cart</h2>
                <div id="cartItems"></div>
                <div id="cartTotal" style="font-size: 22px; font-weight: 700; margin: 20px 0;"></div>
                <textarea id="deliveryInstructions" rows="2" placeholder="Special instructions..." style="width: 100%; padding: 12px; border: 2px solid #E9ECEF; border-radius: 12px; margin: 10px 0;"></textarea>
                <button class="btn btn-primary" onclick="placeOrder()" style="width: 100%;">Place Order</button>
                <button class="btn btn-outline" onclick="closeModal('cartModal')" style="width: 100%; margin-top: 10px;">Close</button>
            </div>
        </div>

        <div id="addFoodModal" class="modal">
            <div class="modal-content">
                <h2 style="margin-bottom: 20px;">➕ New Food Item</h2>
                <div class="form-group">
                    <label>Food Name</label>
                    <input type="text" id="foodName" placeholder="e.g., Margherita Pizza">
                </div>
                <div class="form-group">
                    <label>Price ($)</label>
                    <input type="number" id="foodPrice" placeholder="9.99">
                </div>
                <div class="form-group">
                    <label>Description</label>
                    <textarea id="foodDesc" rows="2" placeholder="Delicious food description..."></textarea>
                </div>
                <div class="form-group">
                    <label>Category</label>
                    <select id="foodCategory">
                        <option>Burgers</option>
                        <option>Pizza</option>
                        <option>Pasta</option>
                        <option>Sushi</option>
                        <option>Desserts</option>
                    </select>
                </div>
                <button class="btn btn-primary" onclick="addFoodItem()" style="width: 100%;">Add Item</button>
                <button class="btn btn-outline" onclick="closeModal('addFoodModal')" style="width: 100%; margin-top: 10px;">Cancel</button>
            </div>
        </div>

        <div id="authModal" class="modal active">
            <div class="modal-content">
                <div style="text-align: center; margin-bottom: 24px;">
                    <div style="font-size: 60px; margin-bottom: 12px;">🍔</div>
                    <h2 style="color: var(--primary);">Welcome to Kohekaf</h2>
                    <p style="color: var(--gray);">Premium food delivery service</p>
                </div>
                <div id="authForm">
                    <div class="form-group">
                        <label>Email Address</label>
                        <input type="email" id="authEmail" placeholder="you@example.com">
                    </div>
                    <div class="form-group">
                        <label>Password</label>
                        <input type="password" id="authPassword" placeholder="••••••••">
                    </div>
                    <button class="btn btn-primary" onclick="login()" style="width: 100%;">Login</button>
                    <button class="btn btn-outline" onclick="showSignupForm()" style="width: 100%; margin-top: 12px;">Create New Account</button>
                </div>
                <p style="text-align: center; margin-top: 20px; font-size: 12px; color: var(--gray);">
                    Demo: any email & password works
                </p>
            </div>
        </div>
    </div>

    <script>
        // Sample Data
        const restaurants = [
            { id: '1', name: 'Burger King', icon: '🍔', rating: 4.8, time: '20-30 min', minOrder: 5, open: true, cuisine: 'American' },
            { id: '2', name: 'Pizza Hut', icon: '🍕', rating: 4.6, time: '25-35 min', minOrder: 8, open: true, cuisine: 'Italian' },
            { id: '3', name: 'KFC', icon: '🍗', rating: 4.5, time: '15-25 min', minOrder: 6, open: true, cuisine: 'Fast Food' },
            { id: '4', name: 'Sushi Master', icon: '🍣', rating: 4.9, time: '20-30 min', minOrder: 12, open: true, cuisine: 'Japanese' },
            { id: '5', name: 'Pasta House', icon: '🍝', rating: 4.7, time: '20-30 min', minOrder: 10, open: true, cuisine: 'Italian' }
        ];

        const foods = [
            { id: '1', name: 'Whopper Burger', price: 8.99, desc: 'Flame-grilled beef patty', category: 'Burgers', restaurantId: '1', popular: true, image: '🍔' },
            { id: '2', name: 'Cheese Pizza', price: 12.99, desc: 'Mozzarella & tomato sauce', category: 'Pizza', restaurantId: '2', popular: true, image: '🍕' },
            { id: '3', name: 'Chicken Bucket', price: 14.99, desc: '8 pcs crispy chicken', category: 'Fast Food', restaurantId: '3', popular: true, image: '🍗' },
            { id: '4', name: 'California Roll', price: 11.99, desc: 'Crab, avocado, cucumber', category: 'Sushi', restaurantId: '4', popular: true, image: '🍣' },
            { id: '5', name: 'Spicy Burger', price: 9.99, desc: 'Spicy beef patty', category: 'Burgers', restaurantId: '1', popular: false, image: '🍔' },
            { id: '6', name: 'Pepperoni Pizza', price: 14.99, desc: 'Classic pepperoni', category: 'Pizza', restaurantId: '2', popular: true, image: '🍕' }
        ];

        // Global State
        let currentUser = null;
        let userType = 'customer';
        let cart = [];
        let location = null;
        let driverOnline = false;

        // Hide loading screen after 2 seconds
        setTimeout(() => {
            document.getElementById('loadingScreen').style.display = 'none';
        }, 2000);

        // Auth Functions
        function login() {
            const email = document.getElementById('authEmail').value;
            const password = document.getElementById('authPassword').value;
            
            if (!email || !password) {
                showToast('Please enter email & password', 'error');
                return;
            }
            
            currentUser = { uid: 'user_1', name: email.split('@')[0], email: email, type: 'customer' };
            userType = 'customer';
            
            document.getElementById('authModal').classList.remove('active');
            document.getElementById('navbar').style.display = 'block';
            document.getElementById('mainContainer').style.display = 'block';
            
            updateUI();
            loadData();
            loadCart();
            showToast(`Welcome back, ${currentUser.name}!`);
        }

        function showSignupForm() {
            const form = document.getElementById('authForm');
            form.innerHTML = `
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" id="signupName" placeholder="John Doe">
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="signupEmail" placeholder="you@example.com">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="signupPassword" placeholder="••••••••">
                </div>
                <div class="form-group">
                    <label>I am a</label>
                    <select id="signupType">
                        <option value="customer">Customer</option>
                        <option value="driver">Delivery Partner</option>
                        <option value="restaurant">Restaurant Owner</option>
                    </select>
                </div>
                <button class="btn btn-primary" onclick="signup()" style="width: 100%;">Create Account</button>
                <button class="btn btn-outline" onclick="showLoginForm()" style="width: 100%; margin-top: 12px;">Back to Login</button>
            `;
        }

        function showLoginForm() {
            const form = document.getElementById('authForm');
            form.innerHTML = `
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="authEmail" placeholder="you@example.com">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="authPassword" placeholder="••••••••">
                </div>
                <button class="btn btn-primary" onclick="login()" style="width: 100%;">Login</button>
                <button class="btn btn-outline" onclick="showSignupForm()" style="width: 100%; margin-top: 12px;">Create New Account</button>
            `;
        }

        function signup() {
            const name = document.getElementById('signupName').value;
            const email = document.getElementById('signupEmail').value;
            const password = document.getElementById('signupPassword').value;
            const type = document.getElementById('signupType').value;
            
            if (!name || !email || !password) {
                showToast('Please fill all fields', 'error');
                return;
            }
            
            currentUser = { uid: 'user_' + Date.now(), name: name, email: email, type: type };
            userType = type;
            
            document.getElementById('authModal').classList.remove('active');
            document.getElementById('navbar').style.display = 'block';
            document.getElementById('mainContainer').style.display = 'block';
            
            updateUI();
            loadData();
            loadCart();
            showToast(`Welcome to Kohekaf, ${name}!`);
        }

        function logout() {
            currentUser = null;
            location.reload();
        }

        function updateUI() {
            // Update user type selector active state
            document.querySelectorAll('.user-type-btn').forEach(btn => btn.classList.remove('active'));
            const btns = document.querySelectorAll('.user-type-btn');
            const index = userType === 'customer' ? 0 : userType === 'driver' ? 1 : userType === 'restaurant' ? 2 : 3;
            if (btns[index]) btns[index].classList.add('active');
            
            // Update nav links
            const navLinks = document.getElementById('navLinks');
            navLinks.innerHTML = `
                <div class="nav-link" onclick="changeSection('home')">🏠 Home</div>
                <div class="nav-link" onclick="showOrders()">📦 Orders</div>
                <div class="cart-icon" onclick="showCart()">🛒<span id="cartBadge" class="cart-badge">0</span></div>
                <div class="nav-link" onclick="logout()">🚪 Logout</div>
            `;
            updateCartBadge();
        }

        function setUserType(type) {
            if (currentUser && currentUser.type !== type) {
                showToast(`You are logged in as ${currentUser.type}`, 'error');
                return;
            }
            userType = type;
            document.querySelectorAll('.user-type-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            changeSection(type === 'customer' ? 'home' : type);
        }

        function changeSection(section) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            const sectionId = userType === 'customer' ? 'customerSection' : userType + 'Section';
            document.getElementById(sectionId).classList.add('active');
            
            if (section === 'orders') showOrders();
            if (section === 'driver') loadDriverOrders();
            if (section === 'restaurant') loadRestaurantData();
            if (section === 'admin') loadAdminData();
        }

        function loadData() {
            loadCategories();
            loadRestaurants();
            loadPopularItems();
        }

        function loadCategories() {
            const cats = ['All', 'Burgers', 'Pizza', 'Pasta', 'Sushi', 'Desserts'];
            const container = document.getElementById('categories');
            container.innerHTML = cats.map(cat => `<button class="category-btn" onclick="filterByCategory('${cat}')">${cat}</button>`).join('');
        }

        function filterByCategory(category) {
            if (category === 'All') loadRestaurants();
            else {
                const filtered = restaurants.filter(r => r.cuisine === category);
                displayRestaurants(filtered);
            }
        }

        function loadRestaurants() {
            displayRestaurants(restaurants);
        }

        function displayRestaurants(list) {
            const container = document.getElementById('restaurantsList');
            container.innerHTML = list.map(r => `
                <div class="restaurant-card" onclick="showRestaurantMenu('${r.id}')">
                    <div class="restaurant-image">${r.icon}</div>
                    <div class="restaurant-info">
                        <div class="restaurant-name">${r.name}</div>
                        <div class="rating">⭐ ${r.rating} (${Math.floor(Math.random() * 500)}+)</div>
                        <div class="delivery-time">🚚 ${r.time}</div>
                        <div>💰 Min $${r.minOrder}</div>
                        <div>${r.open ? '🟢 Open' : '🔴 Closed'}</div>
                    </div>
                </div>
            `).join('');
        }

        function showRestaurantMenu(restId) {
            const restFoods = foods.filter(f => f.restaurantId === restId);
            const modal = document.createElement('div');
            modal.className = 'modal active';
            modal.innerHTML = `
                <div class="modal-content">
                    <h2 style="margin-bottom: 20px;">Menu</h2>
                    ${restFoods.map(f => `
                        <div style="display: flex; justify-content: space-between; align-items: center; padding: 15px; border-bottom: 1px solid #eee;">
                            <div>
                                <strong style="font-size: 16px;">${f.name}</strong>
                                <div style="color: var(--gray); font-size: 13px;">${f.desc}</div>
                                <div style="color: var(--primary); font-weight: 700; margin-top: 5px;">$${f.price}</div>
                            </div>
                            <button class="btn btn-primary" onclick="addToCart('${f.id}', '${f.name}', ${f.price})">Add</button>
                        </div>
                    `).join('')}
                    <button class="btn btn-outline" onclick="this.parentElement.parentElement.remove()" style="width: 100%; margin-top: 15px;">Close</button>
                </div>
            `;
            document.body.appendChild(modal);
        }

        function loadPopularItems() {
            const popular = foods.filter(f => f.popular);
            const container = document.getElementById('popularItems');
            container.innerHTML = popular.map(f => `
                <div class="meal-card" onclick="addToCart('${f.id}', '${f.name}', ${f.price})">
                    <div class="meal-image">${f.image}</div>
                    <div class="meal-info">
                        <div class="meal-name">${f.name}</div>
                        <div class="price">$${f.price}</div>
                        <button class="btn btn-primary" style="width: 100%;">Add to Cart</button>
                    </div>
                </div>
            `).join('');
        }

        function addToCart(id, name, price) {
            const existing = cart.find(i => i.id === id);
            if (existing) existing.qty++;
            else cart.push({ id, name, price, qty: 1 });
            updateCartBadge();
            saveCart();
            showToast(`${name} added to cart!`);
        }

        function updateCartBadge() {
            const badge = document.getElementById('cartBadge');
            if (badge) badge.innerText = cart.reduce((s, i) => s + i.qty, 0);
        }

        function loadCart() {
            const saved = localStorage.getItem('kohekaf_cart');
            if (saved) cart = JSON.parse(saved);
            updateCartBadge();
        }

        function saveCart() {
            localStorage.setItem('kohekaf_cart', JSON.stringify(cart));
        }

        function showCart() {
            const modal = document.getElementById('cartModal');
            const itemsDiv = document.getElementById('cartItems');
            
            if (cart.length === 0) {
                itemsDiv.innerHTML = '<p style="text-align: center;">Your cart is empty</p>';
            } else {
                itemsDiv.innerHTML = cart.map(i => `
                    <div style="display: flex; justify-content: space-between; padding: 12px; border-bottom: 1px solid #eee;">
                        <div>
                            <strong>${i.name}</strong>
                            <div>$${i.price} x ${i.qty}</div>
                        </div>
                        <div>
                            <button class="btn btn-outline" onclick="updateQty('${i.id}', -1)" style="padding: 5px 12px;">-</button>
                            <span style="margin: 0 10px;">${i.qty}</span>
                            <button class="btn btn-outline" onclick="updateQty('${i.id}', 1)" style="padding: 5px 12px;">+</button>
                        </div>
                    </div>
                `).join('');
            }
            
            const total = cart.reduce((s, i) => s + (i.price * i.qty), 0);
            document.getElementById('cartTotal').innerHTML = `Total: $${total.toFixed(2)}`;
            modal.classList.add('active');
        }

        function updateQty(id, change) {
            const item = cart.find(i => i.id === id);
            if (item) {
                item.qty += change;
                if (item.qty <= 0) cart = cart.filter(i => i.id !== id);
                updateCartBadge();
                saveCart();
                showCart();
            }
        }

        function placeOrder() {
            if (cart.length === 0) {
                showToast('Cart is empty!', 'error');
                return;
            }
            if (!location) {
                showToast('Please set delivery location!', 'error');
                return;
            }
            
            const total = cart.reduce((s, i) => s + (i.price * i.qty), 0);
            const order = {
                id: Date.now(),
                items: [...cart],
                total: total,
                location: location,
                status: 'pending',
                date: new Date().toLocaleString(),
                userId: currentUser?.uid
            };
            
            let orders = JSON.parse(localStorage.getItem('kohekaf_orders') || '[]');
            orders.unshift(order);
            localStorage.setItem('kohekaf_orders', JSON.stringify(orders));
            
            cart = [];
            saveCart();
            updateCartBadge();
            closeModal('cartModal');
            showToast('Order placed successfully!');
            showOrders();
        }

        function showOrders() {
            const orders = JSON.parse(localStorage.getItem('kohekaf_orders') || '[]');
            const container = document.getElementById('customerSection');
            const ordersHtml = `
                <div class="card">
                    <h2>📦 My Orders</h2>
                    ${orders.map(o => `
                        <div class="order-card">
                            <div><strong>Order #${o.id}</strong></div>
                            <div>Status: <span class="order-status status-${o.status}">${o.status}</span></div>
                            <div>Total: $${o.total.toFixed(2)}</div>
                            <div>Items: ${o.items.length} items</div>
                            <div style="font-size: 12px; color: var(--gray);">${o.date}</div>
                        </div>
                    `).join('')}
                </div>
            `;
            
            const existing = document.querySelector('#customerSection .card:last-child');
            if (existing && existing.innerHTML.includes('My Orders')) existing.remove();
            container.insertAdjacentHTML('beforeend', ordersHtml);
        }

        function toggleDriverStatus() {
            driverOnline = !driverOnline;
            const btn = document.getElementById('driverStatusBtn');
            btn.innerHTML = driverOnline ? '🔴 Go Offline' : '🟢 Go Online';
            showToast(driverOnline ? 'You are now online' : 'You are offline');
        }

        function loadDriverOrders() {
            const orders = JSON.parse(localStorage.getItem('kohekaf_orders') || '[]');
            const pending = orders.filter(o => o.status === 'pending');
            const container = document.getElementById('driverOrdersList');
            container.innerHTML = `
                <h3>Available Orders</h3>
                ${pending.map(o => `
                    <div class="order-card">
                        <div><strong>Order #${o.id}</strong></div>
                        <div>Total: $${o.total}</div>
                        <div>📍 ${o.location}</div>
                        <button class="btn btn-primary" onclick="acceptOrder(${o.id})" style="margin-top: 8px;">Accept Delivery</button>
                    </div>
                `).join('')}
            `;
        }

        function acceptOrder(orderId) {
            let orders = JSON.parse(localStorage.getItem('kohekaf_orders') || '[]');
            const order = orders.find(o => o.id === orderId);
            if (order) {
                order.status = 'confirmed';
                localStorage.setItem('kohekaf_orders', JSON.stringify(orders));
                loadDriverOrders();
                showToast('Order accepted!');
            }
        }

        function loadRestaurantData() {
            const menuDiv = document.getElementById('restaurantMenu');
            menuDiv.innerHTML = `
                <div class="meal-grid">
                    ${foods.slice(0, 4).map(f => `
                        <div class="meal-card">
                            <div class="meal-image">${f.image}</div>
                            <div class="meal-info">
                                <div class="meal-name">${f.name}</div>
                                <div class="price">$${f.price}</div>
                            </div>
                        </div>
                    `).join('')}
                </div>
            `;
            
            const orders = JSON.parse(localStorage.getItem('kohekaf_orders') || '[]');
            document.getElementById('restaurantOrders').innerHTML = orders.map(o => `
                <div class="order-card">
                    <div>Order #${o.id}</div>
                    <div>Total: $${o.total}</div>
                    <div>Status: ${o.status}</div>
                </div>
            `).join('');
        }

        function showAddFoodModal() {
            document.getElementById('addFoodModal').classList.add('active');
        }

        function addFoodItem() {
            const name = document.getElementById('foodName').value;
            const price = parseFloat(document.getElementById('foodPrice').value);
            if (name && price) {
                showToast('Food item added!');
                closeModal('addFoodModal');
                loadRestaurantData();
                document.getElementById('foodName').value = '';
                document.getElementById('foodPrice').value = '';
            }
        }

        function loadAdminData() {
            const orders = JSON.parse(localStorage.getItem('kohekaf_orders') || '[]');
            const total = orders.reduce((s, o) => s + o.total, 0);
            
            document.getElementById('adminStats').innerHTML = `
                <div class="stat-card"><div class="stat-value">${restaurants.length}</div><div>Restaurants</div></div>
                <div class="stat-card"><div class="stat-value">${orders.length}</div><div>Orders</div></div>
                <div class="stat-card"><div class="stat-value">$${total.toFixed(2)}</div><div>Revenue</div></div>
            `;
            document.getElementById('allUsersList').innerHTML = '<div>Demo Users: 5 active</div>';
            document.getElementById('allOrdersList').innerHTML = orders.map(o => 
                `<div>Order #${o.id} - $${o.total} - ${o.status}</div>`
            ).join('');
        }

        function updateLocation() {
            const loc = document.getElementById('locationInput').value;
            if (loc) {
                location = loc;
                showToast('Location updated!');
            }
        }

        function searchItems() {
            const term = document.getElementById('searchInput').value.toLowerCase();
            if (term) {
                const filtered = restaurants.filter(r => r.name.toLowerCase().includes(term));
                displayRestaurants(filtered);
            } else {
                loadRestaurants();
            }
        }

        function closeModal(id) {
            document.getElementById(id).classList.remove('active');
        }

        function showToast(msg, type = 'success') {
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.textContent = msg;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }
    </script>
</body>
</html>
