<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Kohekaf | Premium Food Delivery</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #FF5722;
            --primary-dark: #E64A19;
            --primary-light: #FFE0B2;
            --secondary: #4CAF50;
            --dark: #1E2A3E;
            --light: #F9FAFE;
            --white: #FFFFFF;
            --gray: #6C757D;
            --gray-light: #EFF2F8;
            --shadow: 0 20px 35px -12px rgba(0,0,0,0.12);
            --shadow-sm: 0 4px 12px rgba(0,0,0,0.05);
            --radius: 24px;
            --radius-sm: 16px;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Loading Screen */
        .loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(145deg, #0B1120 0%, #19233C 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10000;
            transition: opacity 0.6s ease;
        }

        .loader {
            text-align: center;
        }

        .loader-logo {
            width: 130px;
            height: 130px;
            background: linear-gradient(135deg, #FF5722, #FF8C42);
            border-radius: 45px;
            margin: 0 auto 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 62px;
            animation: floatPremium 2.2s ease-in-out infinite;
            box-shadow: 0 25px 40px rgba(255,87,34,0.3);
        }

        .loader-text {
            color: white;
            font-size: 32px;
            font-weight: 800;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, #fff, #FFB6A0);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .loader-dots {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: 24px;
        }

        .loader-dots span {
            width: 12px;
            height: 12px;
            background: #FF5722;
            border-radius: 50%;
            animation: pulseDot 1.2s infinite ease-in-out both;
        }

        .loader-dots span:nth-child(1) { animation-delay: -0.32s; background: #FF8C42; }
        .loader-dots span:nth-child(2) { animation-delay: -0.16s; background: #FF5722; }

        @keyframes floatPremium {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-12px) rotate(2deg); }
        }

        @keyframes pulseDot {
            0%, 80%, 100% { transform: scale(0.5); opacity: 0.5; }
            40% { transform: scale(1); opacity: 1; }
        }

        /* Auth Modal - Always visible after loading */
        .auth-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 0.5s ease;
        }

        .auth-card {
            background: white;
            border-radius: 36px;
            max-width: 450px;
            width: 90%;
            padding: 40px 32px;
            animation: slideUp 0.5s ease;
            box-shadow: 0 30px 50px rgba(0,0,0,0.2);
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(40px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .auth-header {
            text-align: center;
            margin-bottom: 32px;
        }

        .auth-logo {
            font-size: 70px;
            margin-bottom: 16px;
        }

        .auth-header h2 {
            color: var(--primary);
            font-size: 28px;
            margin-bottom: 8px;
        }

        .auth-header p {
            color: var(--gray);
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: var(--dark);
            font-size: 14px;
        }

        .form-group input, .form-group select {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #E9ECEF;
            border-radius: 16px;
            font-size: 15px;
            transition: all 0.2s;
        }

        .form-group input:focus, .form-group select:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(255,87,34,0.1);
        }

        .btn {
            padding: 14px 28px;
            border: none;
            border-radius: 44px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 15px;
            width: 100%;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
            box-shadow: 0 4px 12px rgba(255,87,34,0.25);
        }

        .btn-primary:hover {
            background: var(--primary-dark);
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(255,87,34,0.35);
        }

        .btn-outline {
            background: transparent;
            border: 2px solid var(--primary);
            color: var(--primary);
            margin-top: 12px;
        }

        .btn-outline:hover {
            background: var(--primary);
            color: white;
        }

        /* Main App - Initially Hidden */
        .main-app {
            display: none;
        }

        /* Navbar */
        .navbar {
            background: rgba(255,255,255,0.96);
            backdrop-filter: blur(15px);
            box-shadow: 0 1px 0 rgba(0,0,0,0.05), var(--shadow-sm);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .nav-container {
            max-width: 1280px;
            margin: 0 auto;
            padding: 14px 28px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }

        .logo {
            font-size: 28px;
            font-weight: 800;
            background: linear-gradient(135deg, var(--primary), #FFB347);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .nav-links {
            display: flex;
            gap: 8px;
            align-items: center;
            flex-wrap: wrap;
        }

        .nav-link {
            padding: 8px 20px;
            border-radius: 40px;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.25s ease;
            color: var(--dark);
            font-size: 14px;
        }

        .nav-link:hover {
            background: var(--primary);
            color: white;
        }

        .cart-icon {
            position: relative;
            cursor: pointer;
            font-size: 26px;
            padding: 6px 12px;
        }

        .cart-badge {
            position: absolute;
            top: -2px;
            right: 2px;
            background: var(--primary);
            color: white;
            border-radius: 30px;
            width: 20px;
            height: 20px;
            font-size: 11px;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .main-container {
            max-width: 1280px;
            margin: 0 auto;
            padding: 32px 24px 60px;
        }

        .user-type-selector {
            display: flex;
            gap: 14px;
            justify-content: center;
            margin-bottom: 40px;
            flex-wrap: wrap;
        }

        .user-type-btn {
            padding: 12px 32px;
            border: none;
            border-radius: 60px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            background: var(--white);
            color: var(--dark);
            box-shadow: var(--shadow-sm);
        }

        .user-type-btn.active {
            background: var(--primary);
            color: white;
            box-shadow: 0 8px 20px rgba(255,87,34,0.3);
        }

        .section {
            display: none;
            animation: fadeIn 0.4s ease;
        }

        .section.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .card {
            background: var(--white);
            border-radius: var(--radius);
            padding: 28px;
            box-shadow: var(--shadow-sm);
            margin-bottom: 28px;
        }

        .restaurant-grid, .meal-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(310px, 1fr));
            gap: 28px;
            margin-top: 24px;
        }

        .restaurant-card, .meal-card {
            background: var(--white);
            border-radius: var(--radius-sm);
            overflow: hidden;
            cursor: pointer;
            transition: all 0.35s ease;
            box-shadow: 0 6px 14px rgba(0,0,0,0.02);
            border: 1px solid #F0F2F8;
        }

        .restaurant-card:hover, .meal-card:hover {
            transform: translateY(-6px);
            box-shadow: 0 20px 30px -12px rgba(0,0,0,0.15);
        }

        .restaurant-image, .meal-image {
            height: 170px;
            background: linear-gradient(145deg, #FFF3E8, #FFE4D6);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 72px;
        }

        .restaurant-info, .meal-info {
            padding: 18px;
        }

        .restaurant-name, .meal-name {
            font-size: 19px;
            font-weight: 800;
            margin-bottom: 8px;
        }

        .rating {
            color: #F5A623;
            margin: 8px 0;
            font-size: 14px;
        }

        .price {
            color: var(--primary);
            font-weight: 800;
            font-size: 20px;
            margin-top: 10px;
        }

        .search-input {
            width: 100%;
            padding: 14px 20px;
            border: 2px solid var(--gray-light);
            border-radius: 60px;
            font-size: 15px;
        }

        .search-input:focus {
            outline: none;
            border-color: var(--primary);
        }

        .category-btn {
            padding: 10px 28px;
            background: white;
            border: 1px solid #E9ECF0;
            border-radius: 40px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }

        .category-btn:hover {
            background: var(--primary);
            color: white;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.65);
            backdrop-filter: blur(8px);
            z-index: 2000;
            align-items: center;
            justify-content: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: white;
            border-radius: 36px;
            max-width: 500px;
            width: 90%;
            max-height: 85vh;
            overflow-y: auto;
            padding: 32px;
        }

        .order-card {
            background: #FBFDFF;
            border-radius: 20px;
            padding: 18px;
            margin-bottom: 14px;
            border-left: 5px solid var(--primary);
        }

        .status-pending { background: #FFF3E0; color: #E67E22; padding: 4px 12px; border-radius: 40px; font-size: 12px; font-weight: 700; display: inline-block; }
        .status-confirmed { background: #E3F2FD; color: #1976D2; padding: 4px 12px; border-radius: 40px; font-size: 12px; font-weight: 700; }
        
        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: #1F2937;
            color: white;
            padding: 14px 28px;
            border-radius: 60px;
            z-index: 2100;
            animation: slideUp 0.3s ease;
        }

        @keyframes slideUp {
            from { transform: translateY(70px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        @media (max-width: 768px) {
            .nav-container { flex-direction: column; gap: 12px; }
            .restaurant-grid, .meal-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <!-- Loading Screen -->
    <div id="loadingScreen" class="loading-screen">
        <div class="loader">
            <div class="loader-logo">🍜</div>
            <div class="loader-text">Kohekaf</div>
            <div class="loader-dots"><span></span><span></span><span></span></div>
        </div>
    </div>

    <!-- Auth Container (will be shown after loading) -->
    <div id="authContainer" class="auth-container" style="display: none;">
        <div class="auth-card">
            <div class="auth-header">
                <div class="auth-logo">🍔</div>
                <h2>Welcome to Kohekaf</h2>
                <p>Premium food delivery service</p>
            </div>
            <div id="authForm">
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="authEmail" placeholder="you@example.com">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="authPassword" placeholder="••••••••">
                </div>
                <button class="btn btn-primary" onclick="handleLogin()">Login</button>
                <button class="btn btn-outline" onclick="showSignupForm()">Create New Account</button>
            </div>
            <p style="text-align: center; margin-top: 20px; font-size: 12px; color: var(--gray);">
                Demo: any email & password works
            </p>
        </div>
    </div>

    <!-- Main App -->
    <div id="mainApp" class="main-app">
        <div id="navbar" class="navbar">
            <div class="nav-container">
                <div class="logo" onclick="changeSection('home')"><i class="fas fa-utensils"></i> Kohekaf</div>
                <div class="nav-links" id="navLinks"></div>
            </div>
        </div>

        <div class="main-container">
            <div class="user-type-selector">
                <button class="user-type-btn active" onclick="setUserType('customer')">👤 Customer</button>
                <button class="user-type-btn" onclick="setUserType('driver')">🚗 Delivery</button>
                <button class="user-type-btn" onclick="setUserType('restaurant')">🏪 Restaurant</button>
                <button class="user-type-btn" onclick="setUserType('admin')">👑 Admin</button>
            </div>

            <!-- Customer Section -->
            <div id="customerSection" class="section active">
                <div class="card">
                    <div style="display: flex; gap: 12px; flex-wrap: wrap;">
                        <i class="fas fa-map-marker-alt" style="font-size: 24px; color: var(--primary);"></i>
                        <input type="text" id="locationInput" class="search-input" placeholder="Enter delivery location" style="flex: 1;">
                        <button class="btn btn-primary" onclick="updateLocation()">Set Location</button>
                    </div>
                </div>
                <div class="card">
                    <input type="text" id="searchInput" class="search-input" placeholder="🔍 Search for restaurants or food..." onkeyup="searchItems()">
                </div>
                <div style="overflow-x: auto; margin-bottom: 24px;">
                    <div id="categories" style="display: flex; gap: 12px;"></div>
                </div>
                <h2 style="margin-bottom: 16px;">🍽️ Popular Restaurants</h2>
                <div id="restaurantsList" class="restaurant-grid"></div>
                <h2 style="margin: 40px 0 16px;">🔥 Trending Now</h2>
                <div id="popularItems" class="meal-grid"></div>
            </div>

            <!-- Driver Section -->
            <div id="driverSection" class="section">
                <div class="card">
                    <h2>🚗 Delivery Dashboard</h2>
                    <button class="btn btn-primary" onclick="toggleDriverStatus()" id="driverStatusBtn">🟢 Go Online</button>
                    <button class="btn btn-outline" onclick="loadDriverOrders()" style="margin-left: 12px;">🔄 Refresh</button>
                    <div id="driverOrdersList" style="margin-top: 24px;"></div>
                </div>
            </div>

            <!-- Restaurant Section -->
            <div id="restaurantSection" class="section">
                <div class="card">
                    <h2>🏪 Restaurant Dashboard</h2>
                    <button class="btn btn-primary" onclick="showAddFoodModal()">➕ Add New Item</button>
                    <div id="restaurantMenu" style="margin-top: 24px;"></div>
                    <h3 style="margin: 32px 0 16px;">📦 Incoming Orders</h3>
                    <div id="restaurantOrders"></div>
                </div>
            </div>

            <!-- Admin Section -->
            <div id="adminSection" class="section">
                <div class="stats-grid" id="adminStats" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px;"></div>
                <div class="card"><h3>👥 Users</h3><div id="allUsersList"></div></div>
                <div class="card"><h3>📊 Orders</h3><div id="allOrdersList"></div></div>
            </div>
        </div>
    </div>

    <!-- Modals -->
    <div id="cartModal" class="modal">
        <div class="modal-content">
            <h2>🛒 Your Cart</h2>
            <div id="cartItems"></div>
            <div id="cartTotal" style="font-size: 22px; font-weight: 700; margin: 20px 0;"></div>
            <textarea id="deliveryInstructions" rows="2" placeholder="Special instructions..." style="width: 100%; padding: 12px; border-radius: 12px;"></textarea>
            <button class="btn btn-primary" onclick="placeOrder()" style="width: 100%;">Place Order</button>
            <button class="btn btn-outline" onclick="closeModal('cartModal')" style="width: 100%; margin-top: 10px;">Close</button>
        </div>
    </div>

    <div id="addFoodModal" class="modal">
        <div class="modal-content">
            <h2>➕ New Food Item</h2>
            <div class="form-group"><label>Food Name</label><input type="text" id="foodName"></div>
            <div class="form-group"><label>Price ($)</label><input type="number" id="foodPrice"></div>
            <div class="form-group"><label>Description</label><textarea id="foodDesc" rows="2"></textarea></div>
            <div class="form-group"><label>Category</label><select id="foodCategory"><option>Burgers</option><option>Pizza</option><option>Sushi</option></select></div>
            <button class="btn btn-primary" onclick="addFoodItem()">Add Item</button>
            <button class="btn btn-outline" onclick="closeModal('addFoodModal')">Cancel</button>
        </div>
    </div>

    <script>
        // Data
        const restaurants = [
            { id: '1', name: 'Spice Kingdom', icon: '🍛', rating: 4.9, time: '20-25 min', minOrder: 7, open: true, cuisine: 'Indian' },
            { id: '2', name: 'Bella Napoli', icon: '🍕', rating: 4.8, time: '25-35 min', minOrder: 10, open: true, cuisine: 'Italian' },
            { id: '3', name: 'Sushi Zen', icon: '🍣', rating: 4.95, time: '15-25 min', minOrder: 12, open: true, cuisine: 'Japanese' },
            { id: '4', name: 'Burger District', icon: '🍔', rating: 4.7, time: '20-30 min', minOrder: 6, open: true, cuisine: 'Burgers' },
            { id: '5', name: 'Wok & Roll', icon: '🥡', rating: 4.6, time: '20-30 min', minOrder: 8, open: true, cuisine: 'Chinese' }
        ];

        let foods = [
            { id: 'f1', name: 'Butter Chicken', price: 13.99, desc: 'Creamy tomato gravy', category: 'Indian', restaurantId: '1', popular: true, image: '🍛' },
            { id: 'f2', name: 'Margherita Pizza', price: 11.99, desc: 'Fresh mozzarella', category: 'Pizza', restaurantId: '2', popular: true, image: '🍕' },
            { id: 'f3', name: 'Rainbow Roll', price: 16.99, desc: 'Fresh salmon', category: 'Sushi', restaurantId: '3', popular: true, image: '🍣' },
            { id: 'f4', name: 'Smash Burger', price: 9.99, desc: 'Double beef', category: 'Burgers', restaurantId: '4', popular: true, image: '🍔' },
            { id: 'f5', name: 'Kung Pao Chicken', price: 12.99, desc: 'Spicy & savory', category: 'Chinese', restaurantId: '5', popular: true, image: '🥡' }
        ];

        let currentUser = null;
        let userType = 'customer';
        let cart = [];
        let location = null;
        let driverOnline = false;

        // Loading animation and show auth
        setTimeout(() => {
            const loadingScreen = document.getElementById('loadingScreen');
            loadingScreen.style.opacity = '0';
            setTimeout(() => {
                loadingScreen.style.display = 'none';
                document.getElementById('authContainer').style.display = 'flex';
            }, 500);
        }, 1500);

        function handleLogin() {
            const email = document.getElementById('authEmail').value;
            if (!email) {
                showToast('Please enter email', 'error');
                return;
            }
            currentUser = { uid: 'user_1', name: email.split('@')[0], email: email, type: 'customer' };
            userType = 'customer';
            
            document.getElementById('authContainer').style.display = 'none';
            document.getElementById('mainApp').style.display = 'block';
            
            updateUI();
            loadData();
            loadCart();
            showToast(`Welcome ${currentUser.name}! 🎉`);
        }

        function showSignupForm() {
            const formDiv = document.getElementById('authForm');
            formDiv.innerHTML = `
                <div class="form-group"><label>Full Name</label><input type="text" id="signupName" placeholder="John Doe"></div>
                <div class="form-group"><label>Email</label><input type="email" id="signupEmail" placeholder="you@example.com"></div>
                <div class="form-group"><label>Password</label><input type="password" id="signupPassword" placeholder="••••••••"></div>
                <div class="form-group"><label>I am a</label><select id="signupType"><option value="customer">Customer</option><option value="driver">Delivery Partner</option><option value="restaurant">Restaurant Owner</option></select></div>
                <button class="btn btn-primary" onclick="handleSignup()">Create Account</button>
                <button class="btn btn-outline" onclick="showLoginForm()">Back to Login</button>
            `;
        }

        function showLoginForm() {
            const formDiv = document.getElementById('authForm');
            formDiv.innerHTML = `
                <div class="form-group"><label>Email</label><input type="email" id="authEmail" placeholder="you@example.com"></div>
                <div class="form-group"><label>Password</label><input type="password" id="authPassword" placeholder="••••••••"></div>
                <button class="btn btn-primary" onclick="handleLogin()">Login</button>
                <button class="btn btn-outline" onclick="showSignupForm()">Create New Account</button>
            `;
        }

        function handleSignup() {
            const name = document.getElementById('signupName').value;
            const email = document.getElementById('signupEmail').value;
            const type = document.getElementById('signupType').value;
            if (!name || !email) {
                showToast('Please fill all fields', 'error');
                return;
            }
            currentUser = { uid: 'user_' + Date.now(), name: name, email: email, type: type };
            userType = type;
            
            document.getElementById('authContainer').style.display = 'none';
            document.getElementById('mainApp').style.display = 'block';
            
            updateUI();
            loadData();
            loadCart();
            showToast(`Welcome ${name}! 🎉`);
        }

        function logout() {
            location.reload();
        }

        function updateUI() {
            const btns = document.querySelectorAll('.user-type-btn');
            const types = ['customer', 'driver', 'restaurant', 'admin'];
            const idx = types.indexOf(userType);
            btns.forEach(btn => btn.classList.remove('active'));
            if (btns[idx]) btns[idx].classList.add('active');
            
            document.getElementById('navLinks').innerHTML = `
                <div class="nav-link" onclick="changeSection('home')">🏠 Home</div>
                <div class="nav-link" onclick="showOrders()">📦 Orders</div>
                <div class="cart-icon" onclick="showCart()">🛒<span id="cartBadge" class="cart-badge">0</span></div>
                <div class="nav-link" onclick="logout()">🚪 Logout</div>
            `;
            updateCartBadge();
        }

        function setUserType(type) {
            if (currentUser && currentUser.type !== type && type !== 'admin') {
                showToast(`You are logged in as ${currentUser.type}`, 'error');
                return;
            }
            userType = type;
            changeSection(type === 'customer' ? 'home' : type);
            
            const btns = document.querySelectorAll('.user-type-btn');
            const types = ['customer', 'driver', 'restaurant', 'admin'];
            const idx = types.indexOf(type);
            btns.forEach(btn => btn.classList.remove('active'));
            if (btns[idx]) btns[idx].classList.add('active');
            
            if (type === 'driver') loadDriverOrders();
            if (type === 'restaurant') loadRestaurantData();
            if (type === 'admin') loadAdminData();
        }

        function changeSection(section) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            const sectionMap = { home: 'customerSection', driver: 'driverSection', restaurant: 'restaurantSection', admin: 'adminSection' };
            const targetId = sectionMap[section] || (userType + 'Section');
            document.getElementById(targetId).classList.add('active');
            if (section === 'orders') showOrders();
        }

        function loadData() {
            const cats = ['All', 'Indian', 'Italian', 'Japanese', 'Burgers', 'Chinese'];
            document.getElementById('categories').innerHTML = cats.map(c => `<button class="category-btn" onclick="filterByCategory('${c}')">${c}</button>`).join('');
            displayRestaurants(restaurants);
            document.getElementById('popularItems').innerHTML = foods.filter(f => f.popular).map(f => `
                <div class="meal-card" onclick="addToCart('${f.id}','${f.name}',${f.price})">
                    <div class="meal-image">${f.image}</div>
                    <div class="meal-info"><div class="meal-name">${f.name}</div><div class="price">$${f.price}</div>
                    <button class="btn btn-primary" style="width:100%; margin-top:8px;">Add to Cart</button></div>
                </div>
            `).join('');
        }

        function filterByCategory(cat) {
            if (cat === 'All') displayRestaurants(restaurants);
            else displayRestaurants(restaurants.filter(r => r.cuisine === cat));
        }

        function displayRestaurants(list) {
            document.getElementById('restaurantsList').innerHTML = list.map(r => `
                <div class="restaurant-card" onclick="showRestaurantMenu('${r.id}')">
                    <div class="restaurant-image">${r.icon}</div>
                    <div class="restaurant-info">
                        <div class="restaurant-name">${r.name}</div>
                        <div class="rating">⭐ ${r.rating} (${Math.floor(200 + Math.random() * 300)}+)</div>
                        <div class="delivery-time">🚚 ${r.time}</div>
                        <div>💰 Min $${r.minOrder}</div>
                    </div>
                </div>
            `).join('');
        }

        function showRestaurantMenu(restId) {
            const items = foods.filter(f => f.restaurantId === restId);
            const modal = document.createElement('div');
            modal.className = 'modal active';
            modal.innerHTML = `
                <div class="modal-content">
                    <h2>Menu</h2>
                    ${items.map(f => `<div style="display:flex; justify-content:space-between; padding:12px 0; border-bottom:1px solid #eee;">
                        <div><strong>${f.name}</strong><div style="color:gray;">${f.desc}</div><div style="color:var(--primary);">$${f.price}</div></div>
                        <button class="btn btn-primary" onclick="addToCart('${f.id}','${f.name}',${f.price}); this.closest('.modal').remove();">Add</button>
                    </div>`).join('')}
                    <button class="btn btn-outline" onclick="this.closest('.modal').remove()">Close</button>
                </div>
            `;
            document.body.appendChild(modal);
        }

        function addToCart(id, name, price) {
            const existing = cart.find(i => i.id === id);
            if (existing) existing.qty++;
            else cart.push({ id, name, price, qty: 1 });
            updateCartBadge();
            saveCart();
            showToast(`${name} added to cart!`);
        }

        function updateCartBadge() {
            const badge = document.getElementById('cartBadge');
            if (badge) badge.innerText = cart.reduce((s, i) => s + i.qty, 0);
        }

        function loadCart() {
            const saved = localStorage.getItem('kohekaf_cart');
            if (saved) cart = JSON.parse(saved);
            updateCartBadge();
        }

        function saveCart() {
            localStorage.setItem('kohekaf_cart', JSON.stringify(cart));
        }

        function showCart() {
            const modal = document.getElementById('cartModal');
            const itemsDiv = document.getElementById('cartItems');
            if (cart.length === 0) itemsDiv.innerHTML = '<p>Your cart is empty</p>';
            else itemsDiv.innerHTML = cart.map(i => `
                <div style="display:flex; justify-content:space-between; padding:12px 0;">
                    <div><strong>${i.name}</strong><div>$${i.price} x ${i.qty}</div></div>
                    <div><button class="btn btn-outline" onclick="updateQty('${i.id}',-1)" style="padding:5px 12px;">-</button>
                    <span style="margin:0 10px;">${i.qty}</span>
                    <button class="btn btn-outline" onclick="updateQty('${i.id}',1)" style="padding:5px 12px;">+</button></div>
                </div>
            `).join('');
            const total = cart.reduce((s, i) => s + (i.price * i.qty), 0);
            document.getElementById('cartTotal').innerHTML = `Total: $${total.toFixed(2)}`;
            modal.classList.add('active');
        }

        function updateQty(id, change) {
            const item = cart.find(i => i.id === id);
            if (item) {
                item.qty += change;
                if (item.qty <= 0) cart = cart.filter(i => i.id !== id);
                updateCartBadge();
                saveCart();
                showCart();
            }
        }

        function placeOrder() {
            if (cart.length === 0) { showToast('Cart empty!', 'error'); return; }
            if (!location) { showToast('Set location first!', 'error'); return; }
            const total = cart.reduce((s, i) => s + (i.price * i.qty), 0);
            const order = { id: Date.now(), items: [...cart], total, location, status: 'pending', date: new Date().toLocaleString(), userId: currentUser?.uid };
            let orders = JSON.parse(localStorage.getItem('kohekaf_orders') || '[]');
            orders.unshift(order);
            localStorage.setItem('kohekaf_orders', JSON.stringify(orders));
            cart = []; saveCart(); updateCartBadge();
            closeModal('cartModal');
            showToast('Order placed!');
            showOrders();
        }

        function showOrders() {
            const orders = JSON.parse(localStorage.getItem('kohekaf_orders') || '[]');
            const container = document.getElementById('customerSection');
            const existing = document.querySelector('#customerSection .orders-card');
            if (existing) existing.remove();
            const html = `<div class="card orders-card"><h2>📦 My Orders</h2>${orders.map(o => `<div class="order-card"><strong>Order #${o.id}</strong><div>Status: <span class="status-${o.status}">${o.status}</span></div><div>Total: $${o.total}</div><div>${o.date}</div></div>`).join('')}</div>`;
            container.insertAdjacentHTML('beforeend', html);
        }

        function toggleDriverStatus() {
            driverOnline = !driverOnline;
            document.getElementById('driverStatusBtn').innerHTML = driverOnline ? '🔴 Go Offline' : '🟢 Go Online';
            showToast(driverOnline ? 'Online' : 'Offline');
        }

        function loadDriverOrders() {
            const orders = JSON.parse(localStorage.getItem('kohekaf_orders') || '[]');
            const pending = orders.filter(o => o.status === 'pending');
            document.getElementById('driverOrdersList').innerHTML = `<h3>Available Orders</h3>${pending.map(o => `<div class="order-card"><strong>Order #${o.id}</strong><div>$${o.total}</div><div>📍 ${o.location}</div><button class="btn btn-primary" onclick="acceptOrder(${o.id})">Accept</button></div>`).join('')}`;
        }

        function acceptOrder(orderId) {
            let orders = JSON.parse(localStorage.getItem('kohekaf_orders') || '[]');
            const order = orders.find(o => o.id === orderId);
            if (order) { order.status = 'confirmed'; localStorage.setItem('kohekaf_orders', JSON.stringify(orders)); loadDriverOrders(); showToast('Order accepted!'); }
        }

        function loadRestaurantData() {
            document.getElementById('restaurantMenu').innerHTML = `<div class="meal-grid">${foods.map(f => `<div class="meal-card"><div class="meal-image">${f.image}</div><div class="meal-info"><div class="meal-name">${f.name}</div><div class="price">$${f.price}</div></div></div>`).join('')}</div>`;
            const orders = JSON.parse(localStorage.getItem('kohekaf_orders') || '[]');
            document.getElementById('restaurantOrders').innerHTML = orders.map(o => `<div class="order-card">Order #${o.id} - $${o.total} - ${o.status}</div>`).join('');
        }

        function showAddFoodModal() { document.getElementById('addFoodModal').classList.add('active'); }
        function addFoodItem() {
            const name = document.getElementById('foodName').value;
            const price = parseFloat(document.getElementById('foodPrice').value);
            if (name && price) {
                foods.push({ id: 'f'+Date.now(), name, price, desc: 'New dish', category: 'Burgers', restaurantId: '2', popular: false, image: '🍲' });
                showToast('Item added!');
                closeModal('addFoodModal');
                loadRestaurantData();
            }
        }
        function loadAdminData() {
            const orders = JSON.parse(localStorage.getItem('kohekaf_orders') || '[]');
            document.getElementById('adminStats').innerHTML = `<div class="stat-card"><div class="stat-value">${restaurants.length}</div><div>Restaurants</div></div><div class="stat-card"><div class="stat-value">${orders.length}</div><div>Orders</div></div>`;
            document.getElementById('allUsersList').innerHTML = '<div>Active users: 5</div>';
            document.getElementById('allOrdersList').innerHTML = orders.map(o => `<div>#${o.id} - $${o.total}</div>`).join('');
        }
        function updateLocation() {
            const loc = document.getElementById('locationInput').value;
            if (loc) { location = loc; showToast('Location updated!'); }
        }
        function searchItems() {
            const term = document.getElementById('searchInput').value.toLowerCase();
            if (term) displayRestaurants(restaurants.filter(r => r.name.toLowerCase().includes(term)));
            else displayRestaurants(restaurants);
        }
        function closeModal(id) { document.getElementById(id).classList.remove('active'); }
        function showToast(msg) {
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.innerHTML = msg;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 2500);
        }
    </script>
</body>
</html>
